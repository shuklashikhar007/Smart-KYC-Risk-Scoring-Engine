<div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 mb-8">
  
  <div class="flex flex-col items-center justify-center">
    <input 
      type="file" 
      id="file-upload" 
      class="hidden" 
      accept=".csv"
      (change)="onFileSelected($event)"
    >
    <label 
      for="file-upload" 
      class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors flex items-center gap-2 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
      </svg>
      Select Customer CSV
    </label>
    
    @if (fileName) {
      <p class="mt-4 text-sm text-slate-500 font-medium">
        Loaded: <span class="text-blue-600">{{ fileName }}</span>
      </p>
    }
    
    @if (errorMessage) {
      <p class="mt-2 text-sm text-red-600 font-bold bg-red-50 py-1 px-3 rounded">
        {{ errorMessage }}
      </p>
    }
  </div>

  <div class="mt-6 border-t border-slate-100 pt-6 flex justify-end">
    <button 
      (click)="onGenerateReport()"
      [disabled]="!fileName || isUploading"
      [class.opacity-50]="!fileName || isUploading"
      [class.cursor-not-allowed]="!fileName || isUploading"
      class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all flex items-center gap-2">
      
      @if (isUploading) {
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Scoring with AI Model...
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
        </svg>
        Generate Action Report
      }
    </button>
  </div>
</div>
